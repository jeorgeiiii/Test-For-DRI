<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="DRI Survey App - Comprehensive family survey application for Deendayal Research Institute">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="DRI survey app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>DRI survey app</title>
  <link rel="manifest" href="manifest.json">

  <script src="flutter.js" defer></script>
</head>
<body>
  <script>
    // Robust loader: support different flutter.js loader APIs and fall back to loading main.dart.js
    window.addEventListener('load', function () {
      try {
        if (typeof flutter !== 'undefined' && flutter.loader && flutter.loader.loadEntrypoint) {
          // Newer loader API
          flutter.loader.loadEntrypoint({ serviceWorker: { url: 'flutter_service_worker.js' } }).then(function(engineInitializer) {
            engineInitializer.initializeEngine().then(function(appRunner) {
              appRunner.runApp();
            });
          }).catch(function() {
            // fallback to loading main.dart.js directly
            var s = document.createElement('script');
            s.src = 'main.dart.js';
            document.body.appendChild(s);
          });
        } else if (typeof FlutterLoader !== 'undefined' && FlutterLoader.load) {
          // Older loader API
          FlutterLoader.load();
        } else {
          // Final fallback: inject main.dart.js
          var script = document.createElement('script');
          script.src = 'main.dart.js';
          document.body.appendChild(script);
        }
      } catch (e) {
        var script = document.createElement('script');
        script.src = 'main.dart.js';
        document.body.appendChild(script);
      }
    });
  </script>
</body>
</html>
